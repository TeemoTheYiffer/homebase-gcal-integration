name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 12 * * 1"  # Mondays at 12:00 UTC

permissions:
  contents: read

jobs:
  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - run: semgrep ci --config=auto
        env:
          SEMGREP_RULES: p/python p/secrets p/dockerfile

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -e .
      - run: pip install pip-audit
      - run: pip-audit --strict
